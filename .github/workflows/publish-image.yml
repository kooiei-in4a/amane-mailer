name: Publish Amane Mailer Image

on:
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: publish-image-${{ github.ref }}
  cancel-in-progress: false

env:
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/amane-mailer
  IMAGE_PLATFORMS: linux/amd64,linux/arm64

jobs:
  publish:
    name: Build and push image
    runs-on: ubuntu-24.04
    environment: release
    outputs:
      digest: ${{ steps.metadata.outputs.digest }}
      platform: ${{ steps.metadata.outputs.platform }}
      attestation_manifest: ${{ steps.metadata.outputs.attestation_manifest }}
      release_tag: ${{ steps.image.outputs.release_tag }}
      revision: ${{ steps.image.outputs.revision }}
      sha_tag: ${{ steps.image.outputs.sha_tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          fetch-depth: 0

      - name: Validate release tag and resolve image tags
        id: image
        shell: bash
        run: |
          set -euo pipefail

          if [ "${GITHUB_REF_TYPE}" != "tag" ]; then
            echo "::error::Publish must run from a release tag ref, not ${GITHUB_REF_TYPE}."
            exit 1
          fi

          release_tag="${GITHUB_REF_NAME}"
          if ! [[ "${release_tag}" =~ ^v(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)(-[0-9A-Za-z][0-9A-Za-z-]*(\.[0-9A-Za-z][0-9A-Za-z-]*)*)?$ ]]; then
            echo "::error::Release tag must look like v0.1.0 or v0.1.0-rc.1: ${release_tag}"
            exit 1
          fi

          revision="$(git rev-parse HEAD)"
          tag_commit="$(git rev-parse "${release_tag}^{commit}")"
          event_commit="$(git rev-parse "${GITHUB_SHA}^{commit}")"

          if [ "${revision}" != "${tag_commit}" ]; then
            echo "::error::Checked-out commit ${revision} does not match ${release_tag} commit ${tag_commit}."
            exit 1
          fi

          if [ "${revision}" != "${event_commit}" ]; then
            echo "::error::Checked-out commit ${revision} does not match workflow event commit ${event_commit}."
            exit 1
          fi

          tags="${IMAGE_NAME}:sha-${revision}"
          tags="${tags}"$'\n'"${IMAGE_NAME}:${release_tag}"

          {
            echo "release_tag=${release_tag}"
            echo "revision=${revision}"
            echo "sha_tag=sha-${revision}"
            echo "tags<<EOF"
            echo "${tags}"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@96fe6ef7f33517b61c61be40b68a1882f3264fb8

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5

      - name: Login to GHCR
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Ensure image tags are unpublished
        env:
          SHA_IMAGE_REF: ${{ env.IMAGE_NAME }}:${{ steps.image.outputs.sha_tag }}
          VERSION_IMAGE_REF: ${{ env.IMAGE_NAME }}:${{ steps.image.outputs.release_tag }}
        shell: bash
        run: |
          set -euo pipefail

          for image_ref in "${SHA_IMAGE_REF}" "${VERSION_IMAGE_REF}"; do
            if inspect_output="$(docker buildx imagetools inspect "$image_ref" 2>&1)"; then
              echo "::error::Image tag already exists and will not be overwritten: ${image_ref}"
              printf '%s\n' "$inspect_output"
              exit 1
            fi

            if ! printf '%s\n' "$inspect_output" | grep -Eiq 'not found|manifest unknown|name unknown'; then
              echo "::error::Could not confirm image tag is absent: ${image_ref}"
              printf '%s\n' "$inspect_output"
              exit 1
            fi
          done

      - name: Build and push image
        id: build
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf
        with:
          context: .
          file: infra/docker/Dockerfile
          platforms: ${{ env.IMAGE_PLATFORMS }}
          push: true
          provenance: true
          sbom: true
          tags: ${{ steps.image.outputs.tags }}
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ steps.image.outputs.revision }}
            org.opencontainers.image.version=${{ steps.image.outputs.release_tag }}
            org.opencontainers.image.description=Amane Mailer runtime image

      - name: Verify published image metadata
        id: metadata
        env:
          IMAGE_DIGEST: ${{ steps.build.outputs.digest }}
          IMAGE_REF: ${{ env.IMAGE_NAME }}:${{ steps.image.outputs.sha_tag }}
          VERSION_REF: ${{ env.IMAGE_NAME }}:${{ steps.image.outputs.release_tag }}
          IMAGE_PLATFORMS: ${{ env.IMAGE_PLATFORMS }}
          RELEASE_TAG: ${{ steps.image.outputs.release_tag }}
          REVISION: ${{ steps.image.outputs.revision }}
          EXPECTED_SOURCE: ${{ github.server_url }}/${{ github.repository }}
        run: bash scripts/verify-published-image.sh
