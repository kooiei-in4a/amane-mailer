name: Publish Amane Mailer Image

on:
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: publish-image-${{ github.ref }}
  cancel-in-progress: false

env:
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/amane-mailer

jobs:
  publish:
    name: Build and push image
    runs-on: ubuntu-24.04
    environment: release
    outputs:
      digest: ${{ steps.metadata.outputs.digest }}
      platform: ${{ steps.metadata.outputs.platform }}
      attestation_manifest: ${{ steps.metadata.outputs.attestation_manifest }}
      release_tag: ${{ steps.image.outputs.release_tag }}
      revision: ${{ steps.image.outputs.revision }}
      sha_tag: ${{ steps.image.outputs.sha_tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          fetch-depth: 0

      - name: Validate release tag and resolve image tags
        id: image
        shell: bash
        run: |
          set -euo pipefail

          if [ "${GITHUB_REF_TYPE}" != "tag" ]; then
            echo "::error::Publish must run from a release tag ref, not ${GITHUB_REF_TYPE}."
            exit 1
          fi

          release_tag="${GITHUB_REF_NAME}"
          if ! [[ "${release_tag}" =~ ^v(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)(-[0-9A-Za-z][0-9A-Za-z-]*(\.[0-9A-Za-z][0-9A-Za-z-]*)*)?$ ]]; then
            echo "::error::Release tag must look like v0.1.0 or v0.1.0-rc.1: ${release_tag}"
            exit 1
          fi

          revision="$(git rev-parse HEAD)"
          tag_commit="$(git rev-parse "${release_tag}^{commit}")"
          event_commit="$(git rev-parse "${GITHUB_SHA}^{commit}")"

          if [ "${revision}" != "${tag_commit}" ]; then
            echo "::error::Checked-out commit ${revision} does not match ${release_tag} commit ${tag_commit}."
            exit 1
          fi

          if [ "${revision}" != "${event_commit}" ]; then
            echo "::error::Checked-out commit ${revision} does not match workflow event commit ${event_commit}."
            exit 1
          fi

          tags="${IMAGE_NAME}:sha-${revision}"
          tags="${tags}"$'\n'"${IMAGE_NAME}:${release_tag}"

          {
            echo "release_tag=${release_tag}"
            echo "revision=${revision}"
            echo "sha_tag=sha-${revision}"
            echo "tags<<EOF"
            echo "${tags}"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5

      - name: Login to GHCR
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Ensure image tags are unpublished
        env:
          SHA_IMAGE_REF: ${{ env.IMAGE_NAME }}:${{ steps.image.outputs.sha_tag }}
          VERSION_IMAGE_REF: ${{ env.IMAGE_NAME }}:${{ steps.image.outputs.release_tag }}
        shell: bash
        run: |
          set -euo pipefail

          for image_ref in "${SHA_IMAGE_REF}" "${VERSION_IMAGE_REF}"; do
            if inspect_output="$(docker buildx imagetools inspect "$image_ref" 2>&1)"; then
              echo "::error::Image tag already exists and will not be overwritten: ${image_ref}"
              printf '%s\n' "$inspect_output"
              exit 1
            fi

            if ! printf '%s\n' "$inspect_output" | grep -Eiq 'not found|manifest unknown|name unknown'; then
              echo "::error::Could not confirm image tag is absent: ${image_ref}"
              printf '%s\n' "$inspect_output"
              exit 1
            fi
          done

      - name: Build and push image
        id: build
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf
        with:
          context: .
          file: infra/docker/Dockerfile
          platforms: linux/amd64
          push: true
          provenance: true
          sbom: true
          tags: ${{ steps.image.outputs.tags }}
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ steps.image.outputs.revision }}
            org.opencontainers.image.version=${{ steps.image.outputs.release_tag }}
            org.opencontainers.image.description=Amane Mailer runtime image

      - name: Run pushed image
        env:
          IMAGE_REF: ${{ env.IMAGE_NAME }}:${{ steps.image.outputs.sha_tag }}
        run: docker run --rm "$IMAGE_REF" --help

      - name: Verify image config contents
        env:
          IMAGE_REF: ${{ env.IMAGE_NAME }}:${{ steps.image.outputs.sha_tag }}
        run: |
          container_id="$(docker create "$IMAGE_REF" --help)"
          trap 'docker rm -f "$container_id" >/dev/null' EXIT

          mkdir -p /tmp/mailer-config
          docker cp "$container_id:/app/config/mailer/." /tmp/mailer-config

          find /tmp/mailer-config -maxdepth 1 -type f -printf '%f\n' | sort > /tmp/mailer-config-files.txt
          printf '%s\n' \
            tenants.example.json \
            tenants.local-acs.json.example \
            tenants.schema.json \
            > /tmp/expected-mailer-config-files.txt

          diff -u /tmp/expected-mailer-config-files.txt /tmp/mailer-config-files.txt

      - name: Inspect published image metadata
        id: metadata
        env:
          IMAGE_DIGEST: ${{ steps.build.outputs.digest }}
          IMAGE_REF: ${{ env.IMAGE_NAME }}:${{ steps.image.outputs.sha_tag }}
          VERSION_REF: ${{ env.IMAGE_NAME }}:${{ steps.image.outputs.release_tag }}
          RELEASE_TAG: ${{ steps.image.outputs.release_tag }}
          REVISION: ${{ steps.image.outputs.revision }}
        shell: bash
        run: |
          set -euo pipefail

          if [ -z "${IMAGE_DIGEST}" ]; then
            echo "::error::docker/build-push-action did not return an image digest."
            exit 1
          fi

          inspect_text="$(docker buildx imagetools inspect "$IMAGE_REF")"
          version_inspect_text="$(docker buildx imagetools inspect "$VERSION_REF")"
          inspect_raw="$(docker buildx imagetools inspect --raw "$IMAGE_REF")"
          printf '%s\n' "$inspect_text"

          sha_tag_digest="$(printf '%s\n' "$inspect_text" | awk '/^Digest:/ { print $2; exit }')"
          version_tag_digest="$(printf '%s\n' "$version_inspect_text" | awk '/^Digest:/ { print $2; exit }')"

          if [ -z "${sha_tag_digest}" ] || [ -z "${version_tag_digest}" ]; then
            echo "::error::Could not resolve digest for ${IMAGE_REF} or ${VERSION_REF}."
            exit 1
          fi

          if [ "${sha_tag_digest}" != "${IMAGE_DIGEST}" ]; then
            echo "::error::Build digest ${IMAGE_DIGEST} does not match ${IMAGE_REF} digest ${sha_tag_digest}."
            exit 1
          fi

          if [ "${version_tag_digest}" != "${IMAGE_DIGEST}" ]; then
            echo "::error::Build digest ${IMAGE_DIGEST} does not match ${VERSION_REF} digest ${version_tag_digest}."
            exit 1
          fi

          if ! printf '%s\n' "$inspect_raw" | grep -Eq '"vnd\.docker\.reference\.type"[[:space:]]*:[[:space:]]*"attestation-manifest"'; then
            echo "::error::Expected SBOM/provenance attestation manifest was not found for $IMAGE_REF."
            exit 1
          fi

          platform="$(docker image inspect "$IMAGE_REF" --format '{{.Os}}/{{.Architecture}}')"
          source_label="$(docker image inspect "$IMAGE_REF" --format '{{ index .Config.Labels "org.opencontainers.image.source" }}')"
          revision_label="$(docker image inspect "$IMAGE_REF" --format '{{ index .Config.Labels "org.opencontainers.image.revision" }}')"
          version_label="$(docker image inspect "$IMAGE_REF" --format '{{ index .Config.Labels "org.opencontainers.image.version" }}')"
          expected_source="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}"

          if [ "${source_label}" != "${expected_source}" ]; then
            echo "::error::OCI source label mismatch: ${source_label}"
            exit 1
          fi

          if [ "${revision_label}" != "${REVISION}" ]; then
            echo "::error::OCI revision label mismatch: ${revision_label}"
            exit 1
          fi

          if [ "${version_label}" != "${RELEASE_TAG}" ]; then
            echo "::error::OCI version label mismatch: ${version_label}"
            exit 1
          fi

          {
            echo "digest=${IMAGE_DIGEST}"
            echo "platform=${platform}"
            echo "attestation_manifest=present"
          } >> "$GITHUB_OUTPUT"

          {
            echo "## Published image"
            echo
            echo "- Image: \`${IMAGE_REF}\`"
            echo "- Release tag: \`${RELEASE_TAG}\`"
            echo "- SHA tag: \`sha-${REVISION}\`"
            echo "- Digest: \`${IMAGE_DIGEST}\`"
            echo "- Release tag digest: \`${version_tag_digest}\`"
            echo "- Platform: \`${platform}\`"
            echo "- OCI source label: \`${source_label}\`"
            echo "- OCI revision label: \`${revision_label}\`"
            echo "- OCI version label: \`${version_label}\`"
            echo "- SBOM/provenance: \`sbom: true\` and \`provenance: true\`; attestation manifest present"
            echo
            echo '```'
            printf '%s\n' "$inspect_text"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
