name: Publish Amane Mailer Image

on:
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: publish-image-${{ github.ref }}
  cancel-in-progress: false

env:
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/amane-mailer
  IMAGE_TAG: sha-${{ github.sha }}

jobs:
  publish:
    name: Build and push ${{ github.sha }}
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5

      - name: Login to GHCR
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf
        with:
          context: .
          file: infra/docker/Dockerfile
          push: true
          tags: ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.description=Amane Mailer runtime image

      - name: Run pushed image
        run: docker run --rm "${IMAGE_NAME}:${IMAGE_TAG}" --help

      - name: Verify image config contents
        run: |
          container_id="$(docker create "${IMAGE_NAME}:${IMAGE_TAG}" --help)"
          trap 'docker rm -f "$container_id" >/dev/null' EXIT

          mkdir -p /tmp/mailer-config
          docker cp "$container_id:/app/config/mailer/." /tmp/mailer-config

          find /tmp/mailer-config -maxdepth 1 -type f -printf '%f\n' | sort > /tmp/mailer-config-files.txt
          printf '%s\n' \
            tenants.example.json \
            tenants.local-acs.json.example \
            tenants.schema.json \
            > /tmp/expected-mailer-config-files.txt

          diff -u /tmp/expected-mailer-config-files.txt /tmp/mailer-config-files.txt

      - name: Inspect published image
        run: docker buildx imagetools inspect "${IMAGE_NAME}:${IMAGE_TAG}"
