name: Publish Amane Mailer Image

on:
  workflow_dispatch:
    inputs:
      source_ref:
        description: Git ref to build, for example v0.1.0. Defaults to the workflow ref.
        required: false
        default: ""
        type: string
      version_tag:
        description: Optional image version tag to publish, for example v0.1.0.
        required: false
        default: ""
        type: string

permissions:
  contents: read
  packages: write

concurrency:
  group: publish-image-${{ github.ref }}
  cancel-in-progress: false

env:
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/amane-mailer

jobs:
  publish:
    name: Build and push image
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          ref: ${{ inputs.source_ref || github.ref }}

      - name: Resolve image tags
        id: image
        shell: bash
        run: |
          revision="$(git rev-parse HEAD)"
          tags="${IMAGE_NAME}:sha-${revision}"

          if [ -n "${{ inputs.version_tag }}" ]; then
            case "${{ inputs.version_tag }}" in
              v[0-9]*.[0-9]*.[0-9]*)
                tags="${tags}"$'\n'"${IMAGE_NAME}:${{ inputs.version_tag }}"
                ;;
              *)
                echo "::error::version_tag must look like v0.1.0"
                exit 1
                ;;
            esac
          elif [ "${GITHUB_REF_TYPE}" = "tag" ]; then
            tags="${tags}"$'\n'"${IMAGE_NAME}:${GITHUB_REF_NAME}"
          fi

          {
            echo "revision=${revision}"
            echo "sha_tag=sha-${revision}"
            echo "tags<<EOF"
            echo "${tags}"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5

      - name: Login to GHCR
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf
        with:
          context: .
          file: infra/docker/Dockerfile
          push: true
          tags: ${{ steps.image.outputs.tags }}
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ steps.image.outputs.revision }}
            org.opencontainers.image.description=Amane Mailer runtime image

      - name: Run pushed image
        run: docker run --rm "${IMAGE_NAME}:${{ steps.image.outputs.sha_tag }}" --help

      - name: Verify image config contents
        run: |
          container_id="$(docker create "${IMAGE_NAME}:${{ steps.image.outputs.sha_tag }}" --help)"
          trap 'docker rm -f "$container_id" >/dev/null' EXIT

          mkdir -p /tmp/mailer-config
          docker cp "$container_id:/app/config/mailer/." /tmp/mailer-config

          find /tmp/mailer-config -maxdepth 1 -type f -printf '%f\n' | sort > /tmp/mailer-config-files.txt
          printf '%s\n' \
            tenants.example.json \
            tenants.local-acs.json.example \
            tenants.schema.json \
            > /tmp/expected-mailer-config-files.txt

          diff -u /tmp/expected-mailer-config-files.txt /tmp/mailer-config-files.txt

      - name: Inspect published image
        run: docker buildx imagetools inspect "${IMAGE_NAME}:${{ steps.image.outputs.sha_tag }}"
