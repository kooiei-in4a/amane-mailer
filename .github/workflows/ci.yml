name: CI

# CI tiers (single workflow + job-level `if`; job names unchanged for branch protection):
# - feature/** / fix/** push: build-test only
# - develop push or PR targeting develop: build-test + openapi-validation
# - PR targeting main: release-gate CI (incl. Native AOT, amd64 Docker)
# - main push, workflow_dispatch: final CI (incl. Native AOT, amd64/arm64 Docker)
# Fail-secure: workflow_dispatch and unrecognized paths use final CI when triggered.

on:
  pull_request:
    branches:
      - main
      - develop
  push:
    branches:
      - main
      - develop
      - "feature/**"
      - "fix/**"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  DOTNET_CLI_TELEMETRY_OPTOUT: "1"
  DOTNET_NOLOGO: "1"
  CONFIGURATION: Release

jobs:
  build-test:
    name: Restore, build, and test
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      - name: Setup .NET
        uses: actions/setup-dotnet@9a946fdbd5fb07b82b2f5a4466058b876ab72bb2
        with:
          global-json-file: global.json

      - name: Restore
        run: dotnet restore Amane.Mailer.slnx --locked-mode

      - name: Build
        run: dotnet build Amane.Mailer.slnx -c ${{ env.CONFIGURATION }} --no-restore

      - name: Test
        run: dotnet test Amane.Mailer.slnx -c ${{ env.CONFIGURATION }} --no-build --verbosity normal

  native-aot-smoke:
    name: Native AOT publish smoke
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.ref == 'refs/heads/main' ||
      github.base_ref == 'main'
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      - name: Setup .NET
        uses: actions/setup-dotnet@9a946fdbd5fb07b82b2f5a4466058b876ab72bb2
        with:
          global-json-file: global.json

      - name: Install Native AOT prerequisites
        run: |
          sudo apt-get update
          sudo apt-get install --yes --no-install-recommends clang zlib1g-dev

      - name: Restore
        run: dotnet restore Amane.Mailer.slnx --locked-mode

      - name: Publish linux-x64 Native AOT
        run: >
          dotnet publish src/Amane.Mailer/Amane.Mailer.csproj
          -c ${{ env.CONFIGURATION }}
          -r linux-x64
          --self-contained
          --no-restore
          -o artifacts/publish/aot-linux-x64
          /p:PublishAot=true
          /p:IlcTreatWarningsAsErrors=true

      - name: Run published binary
        run: |
          test -x artifacts/publish/aot-linux-x64/Amane.Mailer
          artifacts/publish/aot-linux-x64/Amane.Mailer --help

  docker-build-smoke:
    name: Docker build smoke (${{ matrix.platform }})
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.ref == 'refs/heads/main' ||
      github.base_ref == 'main'
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON((github.event_name == 'workflow_dispatch' || github.ref == 'refs/heads/main') && '{"include":[{"platform":"linux/amd64","tag_suffix":"linux-amd64"},{"platform":"linux/arm64","tag_suffix":"linux-arm64"}]}' || '{"include":[{"platform":"linux/amd64","tag_suffix":"linux-amd64"}]}') }}
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      - name: Set up QEMU
        uses: docker/setup-qemu-action@c7c53464625b32c7a7e944ae62b3e17d2b600130

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5

      - name: Build Mailer image
        run: >
          docker buildx build
          --platform ${{ matrix.platform }}
          --file infra/docker/Dockerfile
          --tag amane-mailer:ci-smoke-${{ matrix.tag_suffix }}
          --load
          .

      - name: Run Mailer image
        run: >
          docker run
          --rm
          --platform ${{ matrix.platform }}
          amane-mailer:ci-smoke-${{ matrix.tag_suffix }}
          --help

  docker-build-smoke-required:
    name: Docker build smoke
    # Always run so required status check reports success when the matrix is skipped
    # on light CI paths (needs + matching if would skip this job and leave checks pending).
    if: always()
    runs-on: ubuntu-24.04
    needs: docker-build-smoke
    steps:
      - name: Confirm platform smoke matrix
        run: |
          result="${{ needs.docker-build-smoke.result }}"
          if [ "$result" = "success" ] || [ "$result" = "skipped" ]; then
            echo "Docker build smoke gate passed (matrix result: $result)."
          else
            echo "Docker build smoke matrix failed (result: $result)."
            exit 1
          fi

  local-compose-fresh-data:
    name: Local compose fresh data dir
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.ref == 'refs/heads/main' ||
      github.base_ref == 'main'
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      - name: Verify fresh bind mount SQLite init
        env:
          LOCAL_FRESH_DATA_RESET: "1"
        run: bash scripts/local-compose-fresh-data-check.sh

  openapi-validation:
    name: OpenAPI validation
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.ref == 'refs/heads/main' ||
      github.ref == 'refs/heads/develop' ||
      github.base_ref == 'main' ||
      github.base_ref == 'develop'
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: "22"

      - name: Validate OpenAPI YAML
        run: node scripts/validate-openapi.mjs docs/api/openapi.yaml

      - name: Check Contracts/runtime/OpenAPI drift
        run: node scripts/check-contract-drift.mjs

      - name: Setup Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"

      - name: Setup Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version: "1.22"

      - name: Verify payload_hash examples (Python)
        run: python examples/payload-hash/python/verify_vectors.py

      - name: Verify payload_hash examples (JavaScript)
        run: node examples/payload-hash/javascript/verify_vectors.mjs

      - name: Verify payload_hash examples (Go)
        working-directory: examples/payload-hash/go
        run: go test ./...
