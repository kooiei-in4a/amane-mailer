name: Publish Amane.Mailer.Contracts

on:
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

concurrency:
  group: publish-contracts-${{ github.ref }}
  cancel-in-progress: false

env:
  DOTNET_CLI_TELEMETRY_OPTOUT: "1"
  DOTNET_NOLOGO: "1"
  CONFIGURATION: Release
  PACKAGE_PROJECT: src/Amane.Mailer.Contracts/Amane.Mailer.Contracts.csproj
  CONTRACTS_TEST_PROJECT: tests/Amane.Mailer.Contracts.Tests/Amane.Mailer.Contracts.Tests.csproj

jobs:
  publish:
    name: Pack and push release package
    runs-on: ubuntu-24.04
    environment: release
    outputs:
      package_version: ${{ steps.release.outputs.package_version }}
      release_tag: ${{ steps.release.outputs.release_tag }}
      revision: ${{ steps.release.outputs.revision }}
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@9a946fdbd5fb07b82b2f5a4466058b876ab72bb2
        with:
          global-json-file: global.json

      - name: Validate release tag and package version
        id: release
        shell: bash
        run: |
          set -euo pipefail

          if [ "${GITHUB_REF_TYPE}" != "tag" ]; then
            echo "::error::Publish must run from a release tag ref, not ${GITHUB_REF_TYPE}."
            exit 1
          fi

          release_tag="${GITHUB_REF_NAME}"
          if ! [[ "${release_tag}" =~ ^v(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)(-[0-9A-Za-z][0-9A-Za-z-]*(\.[0-9A-Za-z][0-9A-Za-z-]*)*)?$ ]]; then
            echo "::error::Release tag must look like v0.1.0 or v0.1.0-rc.1: ${release_tag}"
            exit 1
          fi

          package_version="${release_tag#v}"
          if ! [[ "${package_version}" =~ ^(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)(-[0-9A-Za-z][0-9A-Za-z-]*(\.[0-9A-Za-z][0-9A-Za-z-]*)*)?$ ]]; then
            echo "::error::Invalid package version derived from ${release_tag}: ${package_version}"
            exit 1
          fi

          revision="$(git rev-parse HEAD)"
          tag_commit="$(git rev-parse "${release_tag}^{commit}")"
          event_commit="$(git rev-parse "${GITHUB_SHA}^{commit}")"

          if [ "${revision}" != "${tag_commit}" ]; then
            echo "::error::Checked-out commit ${revision} does not match ${release_tag} commit ${tag_commit}."
            exit 1
          fi

          if [ "${revision}" != "${event_commit}" ]; then
            echo "::error::Checked-out commit ${revision} does not match workflow event commit ${event_commit}."
            exit 1
          fi

          project_version="$(dotnet msbuild "$PACKAGE_PROJECT" -getProperty:Version)"
          project_version="${project_version//$'\r'/}"

          if [ "${project_version}" != "${package_version}" ]; then
            echo "::error::Project Version ${project_version} must match release tag package version ${package_version}."
            exit 1
          fi

          {
            echo "release_tag=${release_tag}"
            echo "package_version=${package_version}"
            echo "revision=${revision}"
          } >> "$GITHUB_OUTPUT"

      - name: Restore
        run: |
          dotnet restore "$PACKAGE_PROJECT" --locked-mode
          dotnet restore "$CONTRACTS_TEST_PROJECT" --locked-mode

      - name: Build
        run: |
          dotnet build "$PACKAGE_PROJECT" -c "$CONFIGURATION" --no-restore
          dotnet build "$CONTRACTS_TEST_PROJECT" -c "$CONFIGURATION" --no-restore

      - name: Test contracts
        run: dotnet test "$CONTRACTS_TEST_PROJECT" -c "$CONFIGURATION" --no-build --verbosity normal

      - name: Pack
        env:
          PACKAGE_VERSION: ${{ steps.release.outputs.package_version }}
        run: >
          dotnet pack "$PACKAGE_PROJECT"
          -c "$CONFIGURATION"
          --no-build
          -o artifacts/nuget
          -p:PackageVersion="$PACKAGE_VERSION"

      - name: Verify symbol package was produced
        shell: bash
        run: |
          set -euo pipefail
          snupkg_count=$(find artifacts/nuget -name '*.snupkg' | wc -l)
          if [ "$snupkg_count" -eq 0 ]; then
            echo "::error::No .snupkg file found in artifacts/nuget/. Symbol package generation may have failed."
            exit 1
          fi
          echo "Found ${snupkg_count} symbol package(s):"
          ls -la artifacts/nuget/*.snupkg

      - name: NuGet login
        id: nuget-login
        uses: NuGet/login@8d196754b4036150537f80ac539e15c2f1028841
        with:
          user: kooiei-in4a

      - name: Push package to nuget.org
        env:
          NUGET_API_KEY: ${{ steps.nuget-login.outputs.NUGET_API_KEY }}
        run: >
          dotnet nuget push artifacts/nuget/*.nupkg
          --source "https://api.nuget.org/v3/index.json"
          --api-key "$NUGET_API_KEY"
          --skip-duplicate

      - name: Push symbols to nuget.org
        id: snupkg-push
        env:
          NUGET_API_KEY: ${{ steps.nuget-login.outputs.NUGET_API_KEY }}
        run: >
          dotnet nuget push artifacts/nuget/*.snupkg
          --source "https://api.nuget.org/v3/index.json"
          --api-key "$NUGET_API_KEY"
          --skip-duplicate

      - name: Write package summary
        env:
          PACKAGE_VERSION: ${{ steps.release.outputs.package_version }}
          RELEASE_TAG: ${{ steps.release.outputs.release_tag }}
          REVISION: ${{ steps.release.outputs.revision }}
          SNUPKG_PUSH_OUTCOME: ${{ steps.snupkg-push.outcome }}
        shell: bash
        run: |
          snupkg_files=$(ls artifacts/nuget/*.snupkg 2>/dev/null | xargs -I{} basename {} || echo "none")
          if [ "$SNUPKG_PUSH_OUTCOME" = "success" ]; then
            snupkg_status="pushed to nuget.org (verify availability via NuGet Package Explorer or VS debugger after indexing)"
          else
            snupkg_status="push failed — manual follow-up required"
          fi
          {
            echo "## Published contracts package"
            echo
            echo "- Package: \`Amane.Mailer.Contracts\`"
            echo "- Package version: \`${PACKAGE_VERSION}\`"
            echo "- Release tag: \`${RELEASE_TAG}\`"
            echo "- Revision: \`${REVISION}\`"
            echo "- Version source: \`${RELEASE_TAG}\` and project \`<Version>\` matched before packing"
            echo "- Symbol package: \`${snupkg_files}\` — ${snupkg_status}"
          } >> "$GITHUB_STEP_SUMMARY"
