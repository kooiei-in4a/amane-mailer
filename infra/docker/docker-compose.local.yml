services:
  mailpit:
    # Local-only SMTP sink. The default intentionally tracks Mailpit latest;
    # set MAILPIT_IMAGE to a tag or digest when reproducing a specific run.
    image: ${MAILPIT_IMAGE:-axllent/mailpit:latest}
    ports:
      - "127.0.0.1:1025:1025"
      - "127.0.0.1:8025:8025"

  # The runtime image is chiseled and runs as a non-root user. On Linux/macOS a
  # fresh bind mount path is auto-created root-owned (mode 755), so SQLite cannot
  # be created until the directory is world-writable. Windows Docker Desktop
  # usually creates a permissive host directory and does not need manual setup.
  data-init:
    image: ${LOCAL_COMPOSE_INIT_IMAGE:-busybox:1.37}
    user: "0:0"
    command: ["sh", "-c", "mkdir -p /app/data && chmod 0777 /app/data"]
    volumes:
      - ${MAILER_DATA_PATH:-../../data/mailer}:/app/data
    restart: "no"

  mailer-migrate:
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile
    depends_on:
      data-init:
        condition: service_completed_successfully
    command: ["db", "migrate"]
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ConnectionStrings__Mailer: "Data Source=/app/data/mailer.db"
      MAILER_TENANTS_PATH: ${MAILER_TENANTS_PATH:-/app/config/mailer/tenants.example.json}
      MAIL_SERVICE_TOKEN: ${MAIL_SERVICE_TOKEN:-local-mail-service-token}
      MAILER_PROVIDER: ${MAILER_PROVIDER:-mailpit}
      MAILPIT_SMTP_HOST: ${MAILPIT_SMTP_HOST:-mailpit}
      MAILPIT_SMTP_PORT: ${MAILPIT_SMTP_PORT:-1025}
      MAILPIT_SMTP_USE_SSL: ${MAILPIT_SMTP_USE_SSL:-false}
      ACS_CONNECTION_STRING: ${ACS_CONNECTION_STRING:-}
    volumes:
      - ${MAILER_DATA_PATH:-../../data/mailer}:/app/data
      - ${MAILER_CONFIG_PATH:-../../config/mailer}:/app/config/mailer:ro
    restart: "no"

  mailer:
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile
    depends_on:
      mailer-migrate:
        condition: service_completed_successfully
      mailpit:
        condition: service_started
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__Mailer: "Data Source=/app/data/mailer.db"
      MAILER_TENANTS_PATH: ${MAILER_TENANTS_PATH:-/app/config/mailer/tenants.example.json}
      MAIL_SERVICE_TOKEN: ${MAIL_SERVICE_TOKEN:-local-mail-service-token}
      MAILER_PROVIDER: ${MAILER_PROVIDER:-mailpit}
      MAILPIT_SMTP_HOST: ${MAILPIT_SMTP_HOST:-mailpit}
      MAILPIT_SMTP_PORT: ${MAILPIT_SMTP_PORT:-1025}
      MAILPIT_SMTP_USE_SSL: ${MAILPIT_SMTP_USE_SSL:-false}
      ACS_CONNECTION_STRING: ${ACS_CONNECTION_STRING:-}
      AMANE_ADMIN_ENABLED: ${AMANE_ADMIN_ENABLED:-false}
      AMANE_ADMIN_USERNAME: ${AMANE_ADMIN_USERNAME:-admin}
      AMANE_ADMIN_PASSWORD_HASH: ${AMANE_ADMIN_PASSWORD_HASH:-}
      # Request-time local address allowlist for /admin; not a socket bind.
      AMANE_ADMIN_ALLOWED_LOCAL_ADDRESS: ${AMANE_ADMIN_ALLOWED_LOCAL_ADDRESS:-}
      MAILER_ADMIN_ALLOWED_LOCAL_ADDRESS: ${MAILER_ADMIN_ALLOWED_LOCAL_ADDRESS:-}
      # Deprecated aliases kept for older local shells.
      AMANE_ADMIN_BIND: ${AMANE_ADMIN_BIND:-}
      MAILER_ADMIN_BIND: ${MAILER_ADMIN_BIND:-}
      AMANE_ADMIN_ALLOW_HTTP: ${AMANE_ADMIN_ALLOW_HTTP:-false}
      AMANE_ADMIN_PII_LIST_MODE: ${AMANE_ADMIN_PII_LIST_MODE:-masked}
    volumes:
      - ${MAILER_DATA_PATH:-../../data/mailer}:/app/data
      - ${MAILER_CONFIG_PATH:-../../config/mailer}:/app/config/mailer:ro
    ports:
      - "127.0.0.1:5280:8080"
    healthcheck:
      test: ["CMD", "/app/Amane.Mailer", "healthcheck"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    restart: unless-stopped
